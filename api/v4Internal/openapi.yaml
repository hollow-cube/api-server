openapi: 3.0.3
info:
    title: Server API
    version: "1.0"
paths:
    /head-database/{category}:
        get:
            operationId: getHeadDatabaseCategory
            parameters:
                - name: category
                  in: path
                  required: true
                  schema:
                    type: string
                - name: page
                  in: query
                  required: true
                  schema:
                    type: integer
                - name: pageSize
                  in: query
                  required: true
                  schema:
                    type: integer
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
    /head-database/search:
        get:
            operationId: searchHeadDatabase
            parameters:
                - name: page
                  in: query
                  required: true
                  schema:
                    type: integer
                - name: pageSize
                  in: query
                  required: true
                  schema:
                    type: integer
                - name: query
                  in: query
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
    /interactions:
        post:
            operationId: executeInteraction
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
    /interactions/commands:
        get:
            operationId: getCommands
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
    /maps:
        post:
            operationId: createMap
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
            responses:
                "201":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
    /maps/{mapId}:
        delete:
            operationId: deleteMap
            parameters:
                - name: mapId
                  in: path
                  required: true
                  schema:
                    type: string
                - name: actorId
                  in: query
                  required: true
                  schema:
                    type: string
                - name: reason
                  in: query
                  required: false
                  schema:
                    type: string
            responses:
                "204":
                    description: Successful response
        get:
            operationId: getMap
            parameters:
                - name: mapId
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
        patch:
            operationId: updateMap
            parameters:
                - name: mapId
                  in: path
                  required: true
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
            responses:
                "200":
                    description: Successful response
    /maps/{mapId}/builders:
        get:
            operationId: getMapBuilders
            parameters:
                - name: mapId
                  in: path
                  required: true
                  schema:
                    type: string
                - name: onlyActive
                  in: query
                  required: true
                  schema:
                    type: boolean
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
        post:
            operationId: inviteMapBuilder
            parameters:
                - name: mapId
                  in: path
                  required: true
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
            responses:
                "200":
                    description: Successful response
    /maps/{mapId}/builders/{playerId}:
        delete:
            operationId: removeMapBuilder
            parameters:
                - name: mapId
                  in: path
                  required: true
                  schema:
                    type: string
                - name: playerId
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
    /maps/{mapId}/builders/{playerId}/accept:
        post:
            operationId: acceptMapBuilderRequest
            parameters:
                - name: mapId
                  in: path
                  required: true
                  schema:
                    type: string
                - name: playerId
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
    /maps/{mapId}/builders/{playerId}/reject:
        post:
            operationId: rejectMapBuilderRequest
            parameters:
                - name: mapId
                  in: path
                  required: true
                  schema:
                    type: string
                - name: playerId
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
    /maps/{mapId}/leaderboard:
        delete:
            operationId: deleteMapLeaderboard
            parameters:
                - name: mapId
                  in: path
                  required: true
                  schema:
                    type: string
                - name: playerId
                  in: query
                  required: true
                  schema:
                    type: string
                - name: notify
                  in: query
                  required: true
                  schema:
                    type: boolean
            responses:
                "204":
                    description: Successful response
        get:
            operationId: getMapLeaderboard
            parameters:
                - name: mapId
                  in: path
                  required: true
                  schema:
                    type: string
                - name: playerId
                  in: query
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
        put:
            operationId: restoreMapLeaderboard
            parameters:
                - name: mapId
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
    /maps/{mapId}/publish:
        post:
            operationId: publishMap
            parameters:
                - name: mapId
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
    /maps/{mapId}/ratings/{playerId}:
        get:
            operationId: getMapPlayerRating
            parameters:
                - name: mapId
                  in: path
                  required: true
                  schema:
                    type: string
                - name: playerId
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
        put:
            operationId: setMapPlayerRating
            parameters:
                - name: mapId
                  in: path
                  required: true
                  schema:
                    type: string
                - name: playerId
                  in: path
                  required: true
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
            responses:
                "200":
                    description: Successful response
    /maps/{mapId}/report:
        post:
            operationId: reportMap
            parameters:
                - name: mapId
                  in: path
                  required: true
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
            responses:
                "200":
                    description: Successful response
    /maps/{mapId}/states/{playerId}/{stateId}:
        put:
            operationId: upsertSaveState
            parameters:
                - name: mapId
                  in: path
                  required: true
                  schema:
                    type: string
                - name: playerId
                  in: path
                  required: true
                  schema:
                    type: string
                - name: stateId
                  in: path
                  required: true
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
            responses:
                "200":
                    description: Successful response
    /maps/{mapId}/states/{playerId}/best:
        get:
            operationId: getBestSaveState
            parameters:
                - name: mapId
                  in: path
                  required: true
                  schema:
                    type: string
                - name: playerId
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
    /maps/{mapId}/states/{playerId}/latest:
        get:
            operationId: getLatestSaveState
            parameters:
                - name: mapId
                  in: path
                  required: true
                  schema:
                    type: string
                - name: playerId
                  in: path
                  required: true
                  schema:
                    type: string
                - name: type
                  in: query
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
    /maps/{mapId}/verify:
        delete:
            operationId: deleteMapVerification
            parameters:
                - name: mapId
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "204":
                    description: Successful response
        post:
            operationId: beginMapVerification
            parameters:
                - name: mapId
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
    /maps/{mapId}/world:
        get:
            operationId: getMapWorld
            parameters:
                - name: mapId
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/vnd.hollowcube.anvil:
                            schema:
                                type: string
                                format: binary
                        application/vnd.hollowcube.anvil-legacy:
                            schema:
                                type: string
                                format: binary
                        application/vnd.hollowcube.polar:
                            schema:
                                type: string
                                format: binary
        put:
            operationId: updateMapWorld
            parameters:
                - name: mapId
                  in: path
                  required: true
                  schema:
                    type: string
                - name: loadTime
                  in: query
                  required: true
                  schema:
                    type: integer
                    format: int64
            requestBody:
                required: true
                content:
                    application/vnd.hollowcube.anvil:
                        schema:
                            type: string
                            format: binary
                    application/vnd.hollowcube.anvil-legacy:
                        schema:
                            type: string
                            format: binary
                    application/vnd.hollowcube.polar:
                        schema:
                            type: string
                            format: binary
            responses:
                "200":
                    description: Successful response
    /maps/hub/leaderboard/{leaderboardId}:
        get:
            operationId: getGlobalLeaderboard
            parameters:
                - name: leaderboardId
                  in: path
                  required: true
                  schema:
                    type: string
                - name: playerId
                  in: query
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
    /maps/search:
        get:
            operationId: searchMaps
            parameters:
                - name: building
                  in: query
                  required: false
                  schema:
                    type: boolean
                - name: contest
                  in: query
                  required: false
                  schema:
                    type: string
                - name: difficulty
                  in: query
                  required: false
                  schema:
                    type: string
                - name: owner
                  in: query
                  required: false
                  schema:
                    type: string
                - name: parkour
                  in: query
                  required: false
                  schema:
                    type: boolean
                - name: quality
                  in: query
                  required: false
                  schema:
                    type: string
                - name: query
                  in: query
                  required: false
                  schema:
                    type: string
                - name: sort
                  in: query
                  required: false
                  schema:
                    type: string
                - name: sortOrder
                  in: query
                  required: false
                  schema:
                    type: string
                - name: page
                  in: query
                  required: false
                  schema:
                    type: string
                - name: pageSize
                  in: query
                  required: false
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
    /maps/search/progress:
        post:
            operationId: searchMapProgress
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
    /notifications:
        get:
            operationId: getNotifications
            parameters:
                - name: playerId
                  in: query
                  required: true
                  schema:
                    type: string
                - name: page
                  in: query
                  required: true
                  schema:
                    type: integer
                - name: pageSize
                  in: query
                  required: true
                  schema:
                    type: integer
                - name: unreadOnly
                  in: query
                  required: true
                  schema:
                    type: boolean
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
    /notifications/{notificationId}:
        delete:
            operationId: deleteNotification
            parameters:
                - name: notificationId
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "204":
                    description: Successful response
        patch:
            operationId: updateNotification
            parameters:
                - name: notificationId
                  in: path
                  required: true
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
            responses:
                "200":
                    description: Successful response
    /players:
        post:
            operationId: createPlayerData
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
            responses:
                "201":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
    /players/{playerId}:
        get:
            operationId: getPlayerData
            parameters:
                - name: playerId
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
        patch:
            operationId: updatePlayerData
            parameters:
                - name: playerId
                  in: path
                  required: true
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
            responses:
                "200":
                    description: Successful response
    /players/{playerId}/alts:
        get:
            operationId: getPlayerAlts
            parameters:
                - name: playerId
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
    /players/{playerId}/display-name:
        get:
            operationId: getPlayerDisplayName
            parameters:
                - name: playerId
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
    /players/{playerId}/hypercube:
        get:
            operationId: getPlayerHypercube
            parameters:
                - name: playerId
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
    /players/{playerId}/map-history:
        get:
            operationId: getPlayerMapHistory
            parameters:
                - name: playerId
                  in: path
                  required: true
                  schema:
                    type: string
                - name: page
                  in: query
                  required: true
                  schema:
                    type: integer
                - name: pageSize
                  in: query
                  required: true
                  schema:
                    type: integer
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
    /players/{playerId}/map-slots:
        get:
            operationId: getMapPlayerSlots
            parameters:
                - name: playerId
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
    /players/{playerId}/top-times:
        get:
            operationId: getPlayerTopTimes
            parameters:
                - name: playerId
                  in: path
                  required: true
                  schema:
                    type: string
                - name: page
                  in: query
                  required: true
                  schema:
                    type: integer
                - name: pageSize
                  in: query
                  required: true
                  schema:
                    type: integer
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
    /players/search:
        post:
            operationId: searchPlayers
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
