replicaCount: 1

base:
  image:
    repository: api-server

  imagePullSecrets: []
  volumes: []
  volumeMounts: []

  env:
    SESSION_ENV: "tilt"
    SESSION_HTTP_ADDRESS: "0.0.0.0"
    SESSION_HTTP_PORT: "9124"
    SESSION_REDIS_ADDRESS: "redis-master:6379"

    SESSION_POSTGRES_PLAYERS_URI: "postgres://postgres:postgres@postgres-postgresql:5432/player-service?sslmode=disable"
    SESSION_POSTGRES_MAPS_URI: "postgres://postgres:postgres@postgres-postgresql:5432/map-service?sslmode=disable"
    SESSION_POSTGRES_URI: "postgres://postgres:postgres@postgres-postgresql:5432/session-service?sslmode=disable"

    SESSION_NATS_SERVERS: "nats://nats:4222"

    SESSION_S3_ENDPOINT: "http://minio:9000"
    SESSION_S3_ACCESS_KEY: "mapmaker"
    SESSION_S3_SECRET_KEY: "mapmaker"

    SESSION_TEBEX_SECRET: "explicit_ignore"

    SESSION_KUBERNETES_NAMESPACE: "mapmaker"

    SESSION_MAPISOLATE_DISABLED: "true"
