replicaCount: 1

base:
  image:
    repository: player-service

  imagePullSecrets: []
  volumes: []
  volumeMounts: []

  env:
    PLAYERS_ENV: "tilt"
    PLAYERS_HTTP_ADDRESS: "0.0.0.0"
    PLAYERS_HTTP_PORT: "9124"
    PLAYERS_POSTGRES_URI: "postgres://postgres:postgres@postgres-postgresql:5432/player-service?sslmode=disable"
    PLAYERS_POSTGRES_MAPS_URI: "postgres://postgres:postgres@postgres-postgresql:5432/map-service?sslmode=disable"
    PLAYERS_NATS_SERVERS: "nats://nats:4222"
    PLAYERS_REDIS_ADDRESS: "redis-master:6379"

    PLAYERS_S3_ENDPOINT: "http://minio:9000"
    PLAYERS_S3_ACCESS_KEY: "mapmaker"
    PLAYERS_S3_SECRET_KEY: "mapmaker"

    PLAYERS_TEBEX_SECRET: "explicit_ignore"
