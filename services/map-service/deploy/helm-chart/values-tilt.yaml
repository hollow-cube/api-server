replicaCount: 1

base:
  image:
    repository: map-service

  imagePullSecrets: []
  volumes: []
  volumeMounts: []

  env:
    MAPS_ENV: "tilt"
    MAPS_HTTP_ADDRESS: "0.0.0.0"
    MAPS_HTTP_PORT: "9124"
    MAPS_POSTGRES_URI: "postgres://postgres:postgres@postgres-postgresql:5432/map-service?sslmode=disable"
    MAPS_SPICEDB_ENDPOINT: "local:50051"
    MAPS_SPICEDB_TOKEN: "supersecretkey"
    MAPS_S3_ENDPOINT: "http://minio:9000"
    MAPS_S3_ACCESS_KEY: "mapmaker"
    MAPS_S3_SECRET_KEY: "mapmaker"
    MAPS_REDIS_ADDRESS: "redis-master:6379"
    MAPS_KAFKA_BROKERS: "kafka:9093"
    MAPS_PLAYER_SERVICE_URL: "http://player-service:9124"
    MAPS_NATS_SERVERS: "nats://nats:4222"

  service:
    monitor:
      enabled: false
