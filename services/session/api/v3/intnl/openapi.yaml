openapi: 3.0.2
info:
  title: Session Service - Hollow Cube
  version: 3.0.0
tags:
  - name: Session
    description: Session management
  - name: Invites
    description: Endpoints related to invites/requests in maps - Probably should all be done with events
  - name: Misc Server Queries
    description: Miscellaneous server queries (kinda want to rework)
paths:
  /session/{playerId}:
    post:
      operationId: createSession
      summary: Create a new session
      description: >-
        Creates a new session for the player, handled by the proxy that they join.
        This will also create a new player if one does not exist.
        
        This should be called before the player is let into a backing server.
      tags: [ Session ]
      parameters:
        - $ref: '#/components/parameters/PlayerId'
      requestBody:
        $ref: '#/components/requestBodies/CreateSessionRequest'
      responses:
        '201':
          $ref: '#/components/responses/CreatedSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: "maintenance mode is enabled"
        '403':
          $ref: '#/components/responses/BannedSessionResponse'
    put:
      operationId: transferSession
      summary: Transfer a session to a new server
      description: >-
        Happens when the player joins a new server. They must have a session already.
      tags: [ Session ]
      parameters:
        - $ref: '#/components/parameters/PlayerId'
      requestBody:
        $ref: '#/components/requestBodies/TransferSessionRequest'
      responses:
        '201':
          $ref: '#/components/responses/TransferSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Session not found
    patch:
      operationId: updateSessionProperties
      summary: Update a session's properties
      tags: [ Session ]
      parameters:
        - $ref: '#/components/parameters/PlayerId'
      requestBody:
        $ref: '#/components/requestBodies/UpdateSession'
      responses:
        '200':
          $ref: '#/components/responses/SessionData'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/SessionNotFound'
    delete:
      operationId: deleteSession
      summary: Delete a session for the given player id
      tags: [ Session ]
      parameters:
        - name: playerId
          in: path
          schema: { type: string }
          required: true
      responses:
        '200':
          description: Session deleted, will be returned even if session does not exist.
        '404':
          description: Session not found (could be deleted already)

  /server/sync:
    post:
      operationId: syncServer
      summary: An endpoint for a starting server to sync its session state
      description: >-
        This is called by a server when it starts up to sync its session state with the session service.
        Currently this is used to ensure that tab lists and player counts are correct.
      tags: [ Misc Server Queries ]
      responses:
        '200':
          description: Server state synced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionList'
  /server/isolate-overrides:
    get:
      operationId: getIsolateOverrides
      tags: [ Misc Server Queries ]
      responses:
        '200':
          description: Isolate overrides
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IsolateOverride'
  /join_map:
    post:
      operationId: joinMap
      summary: Join a map
      tags: [ Misc Server Queries ]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [player, map, state, source]
              properties:
                player: { type: string }
                map: { type: string }
                state: { type: string }
                source: { type: string }
                isolate:
                  type: object
                  properties:
                    override: { type: string }
      responses:
        '200':
          $ref: '#/components/responses/MapJoinSuccess'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Unauthorized
        '503':
          $ref: '#/components/responses/NoServerAvailable'
  /join_hub:
    post:
      operationId: joinHub
      summary: Join a hub
      tags: [ Misc Server Queries ]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                exclude: { type: string }
        required: false
      responses:
        '200':
          $ref: '#/components/responses/MapJoinSuccess'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Unauthorized
        '503':
          $ref: '#/components/responses/NoServerAvailable'

  /invites/map/invite:
    post:
      operationId: inviteToMap
      summary: Invite a player to a map
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MapInvite'
        required: true
      responses:
        '200':
          description: Invite sent
        '409':
          description: Invite already exists
          content:
            application/json:
              schema:
                type: object
                required: [code, message]
                properties:
                  code: { type: string }
                  message: { type: string }
  /invites/map/request:
    post:
      operationId: requestToJoinMap
      summary: Request to join a map
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MapInvite'
        required: true
      responses:
        '200':
          description: Invite requested
        '409':
          description: Request already exists
          content:
            application/json:
              schema:
                type: object
                required: [code, message]
                properties:
                  code: { type: string }
                  message: { type: string }
  /invites/map/accept:
    post:
      operationId: acceptMapInviteOrRequest
      summary: Accept a map invite or map join request
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [senderId, targetId]
              properties:
                senderId: { type: string }
                targetId: { type: string }
        required: true
      responses:
        '200':
          description: Invite or request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MapInvite'
        '400':
          description: See response code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteError'
  /invites/map/reject:
    post:
      operationId: rejectMapInviteOrRequest
      summary: Reject a map invite or map join request
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [senderId, targetId]
              properties:
                senderId: { type: string }
                targetId: { type: string }
        required: true
      responses:
        '200':
          description: Invite or request rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MapInvite'
        '400':
          description: See response code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteError'

components:
  schemas:

    PlayerSkin:
      type: object
      required: [texture, signature]
      properties:
        texture: { type: string }
        signature: { type: string }
    PlayerSession:
      type: object
      required: [playerId, createdAt, proxyId, serverId, hidden, username, presence]
      properties:
        playerId: { type: string }
        createdAt: { type: string }

        proxyId: { type: string }
        serverId: { type: string }

        hidden: { type: boolean }
        username: { type: string }
        skin: { $ref: '#/components/schemas/PlayerSkin' }

        presence: { $ref: '#/components/schemas/Presence' }
    SessionList:
      type: array
      items:
        $ref: '#/components/schemas/PlayerSession'
    Presence:
      type: object
      required: [type, state, instanceId, mapId]
      properties:
        type: { type: string }
        state: { type: string }

        instanceId: { type: string }
        mapId: { type: string }

    MapInvite:
      type: object
      required: [inviteType, senderId, recipientId, mapId, time]
      properties:
        inviteType:
          type: string
          enum: ["invite", "request"]
        senderId: { type: string }
        recipientId: { type: string }

        mapId: { type: string }
        time: { type: integer }
    InviteError:
      type: object
      required: [errorCode, errorText]
      properties:
        errorCode:
          type: number
          minimum: 0
          maximum: 9
        errorText: { type: string }

    IsolateOverride:
      type: object
      required: [ id, lastUpdated ]
      properties:
        id: { type: string }
        lastUpdated: { type: 'string', format: date-time }
  requestBodies:
    CreateSessionRequest:
      content:
        application/json:
          schema:
            type: object
            required: [proxy, username, ip]
            properties:
              proxy: { type: string }
              username: { type: string }
              ip: { type: string }
              connectedHost: { type: string }
              skin:
                $ref: '#/components/schemas/PlayerSkin'
              protocolVersion: { type: integer }
              version: { type: string }
    TransferSessionRequest:
      content:
        application/json:
          schema:
            type: object
            required: [server, type, state, map]
            properties:
              server: { type: string }

              # Presence data
              type: { type: string }
              state: { type: string }
              map: { type: string }
    UpdateSession:
      content:
        application/json:
          schema:
            type: object
            properties:
              hidden: { type: boolean }
              metadata: { type: object, additionalProperties: true }

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            type: object
            required: [ error ]
            properties:
              error: { type: string }
    SessionNotFound:
        description: Session not found

    SessionData:
      description: Session state updated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PlayerSession'

    CreatedSessionResponse:
      description: Session successfully created
      content:
        application/json:
          schema:
            description: PlayerData object from the player service
            type: object
    BannedSessionResponse:
      description: User is banned from the server
      content:
        application/json:
          schema:
            description: Ban object from player service.
            type: object
            additionalProperties: true

    TransferSessionResponse:
      description: Session successfully transferred
      content:
        application/json:
          schema:
            type: object
            required: [ data, isJoin, session ]
            properties:
              data:
                description: PlayerData object from the player service
                type: object
              session:
                $ref: '#/components/schemas/PlayerSession'
              isJoin: { type: boolean }

    MapJoinSuccess:
      description: Map joined successfully
      content:
        application/json:
          schema:
            type: object
            required: [ server, serverClusterIP ]
            properties:
              server: { type: string }
              serverClusterIP: { type: string }
    NoServerAvailable:
      description: No server is available to satisfy request
  parameters:
    PlayerId:
      name: playerId
      in: path
      schema: { type: string }
      required: true