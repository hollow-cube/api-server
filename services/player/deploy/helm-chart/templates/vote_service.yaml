apiVersion: v1
kind: Service
metadata:
  name: {{ include "base.fullname" . }}-votifier
  labels:
    {{- include "base.labels" . | nindent 4 }}
spec:
  type: NodePort
  ports:
    - port: 30192
      targetPort: 30192
      protocol: TCP
      name: votifier
  selector:
    {{- include "base.selectorLabels" . | nindent 4 }}
